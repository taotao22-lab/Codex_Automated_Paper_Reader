sources:
  arxiv:
    enabled: true
    lookback_days: 3
    max_results: 200
    retries: 0
    retry_after_seconds: 20
    html_fallback_enabled: true
    max_api_failures_before_html: 1
    html_fallback_per_category: 50
    html_fallback_max_results: 100
    html_fallback_sleep_seconds: 0.25
  openreview:
    enabled: true
    venues:
      - ICLR
      - NeurIPS
      - ICML
      - TMLR
      - COLM
    max_results: 100
  openalex:
    enabled: false
    lookback_days: 3
    max_results: 100
    per_page: 50
    max_auto_queries: 5
    search_queries: []
    mailto: ""
    api_key_env: OPENALEX_API_KEY
    api_key: ""

output:
  report_dir: ../docs/agent-article-reports
  data_dir: data
  log_dir: logs

retrieval:
  candidate_limit: 100
